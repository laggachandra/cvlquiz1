<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHANDRAVEDALABS Quiz Generator</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">

    <div class="company-header">

        <img
            src="assets/logo.png"
            alt="CHANDRAVEDALABS Logo"
            class="company-logo"
        >

        <div>

            <h1>CHANDRAVEDALABS</h1>

            <p>
            Training and Research Services in Lifesciences
            </p>

        </div>

    </div>

</header>

<div class="container">

    <div class="setup-card">

        <h2>CBT Quiz Generator</h2>

        <div class="form-group">
            <label>Subject</label>
            <select id="subject">
                <option value="All">All Subjects</option>
            </select>
        </div>

        <div class="form-group">
            <label>Chapter</label>
            <select id="chapter">
                <option value="All">All Chapters</option>
            </select>
        </div>

        <div class="form-group">
            <label>Difficulty</label>
            <select id="difficulty">
                <option value="All">All</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
        </div>

        <div class="form-group">
            <label>Number of Questions</label>
            <input
                type="number"
                id="questionCount"
                value="10"
                min="1"
            >
        </div>

        <div class="form-group">
            <label>Time Limit (Minutes)</label>
            <input
                type="number"
                id="timeLimit"
                value="30"
                min="1"
            >
        </div>

        <div class="checkbox-group">
            <input
                type="checkbox"
                id="shuffle"
                checked
            >
            <label for="shuffle">
                Shuffle Questions
            </label>
        </div>

        <button id="startQuizBtn">
            Start Quiz
        </button>

    </div>

</div>

<footer>

    <p>
        © CHANDRAVEDALABS Quiz Generator
    </p>

</footer>

<script src="js/app.js"></script>

</body>
</html>
